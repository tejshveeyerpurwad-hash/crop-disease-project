version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/uploads:/app/app/uploads
      - ./backend/crop_disease.db:/app/crop_disease.db
    environment:
      - DATABASE_URL=sqlite:///./crop_disease.db
      - SECRET_KEY=super-secret-production-key-change-me
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
